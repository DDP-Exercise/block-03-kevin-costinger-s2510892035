<!DOCTYPE html>
<!-- IMPORTANT:  DO NOT CHANGE THIS FILE -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event-ually functional</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div id="expenseTracker">
    <h1>Kevin Costinger</h1>

    <form id="expenseForm">
        <label for="date">Date:</label>
        <input type="date" id="date" name="date">

        <label for="amount">Amount (€):</label>
        <input type="number" id="amount" name="amount" step="0.01" placeholder="e.g. 10.50">

        <label for="expense">Expense:</label>
        <input type="text" id="expense" name="expense" placeholder="Enter text">

        <button type="submit">Submit</button>
    </form>

    <table id="expenses">
        <thead>
        <tr>
            <th>Date</th>
            <th>Amount</th>
            <th>Expense</th>
            <th>Delete</th>
        </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <p>Sum of logged expenses: <span id="expenseSum">0,00 €</span></p>
</div>

<script src="js/kevincostinger.js"></script>
</body>
</html>
